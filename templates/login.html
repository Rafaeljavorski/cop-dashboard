<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Painel COP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F4F7F9; --surface:#FFFFFF; --line:#DCE3E8;
    --text:#16232C; --text-dim:#5B6B76;
    --fiber:#16A99C; --lime:#7CC44B; --alert:#D6473A;
    --font-display:'Space Grotesk', sans-serif; --font-body:'Inter', sans-serif;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; height:100%; }
  body{
    background:
      radial-gradient(ellipse 1200px 600px at 15% -10%, rgba(22,169,156,0.06), transparent 60%),
      radial-gradient(ellipse 900px 500px at 100% 100%, rgba(69,82,214,0.05), transparent 55%),
      var(--bg);
    color:var(--text); font-family:var(--font-body);
    display:flex; align-items:center; justify-content:center;
  }
  .card{
    background:var(--surface); border:1px solid var(--line); border-radius:16px;
    padding:36px 34px; width:100%; max-width:360px;
    box-shadow:0 10px 40px rgba(22,32,42,0.08);
  }
  .brand{ display:flex; align-items:center; gap:10px; margin-bottom:22px; }
  .brand-mark{
    width:38px; height:38px; border-radius:50%;
    background:linear-gradient(135deg, var(--fiber), var(--lime));
    flex-shrink:0;
  }
  .brand h1{ font-family:var(--font-display); font-size:16px; margin:0; }
  .brand p{ margin:2px 0 0; font-size:12px; color:var(--text-dim); }
  label{ display:block; font-size:12.5px; font-weight:600; color:var(--text-dim); margin:14px 0 6px; }
  input{
    width:100%; padding:11px 13px; border-radius:9px; border:1px solid var(--line);
    font-family:var(--font-body); font-size:14px; color:var(--text); outline:none;
  }
  input:focus{ border-color:var(--fiber); }
  button{
    width:100%; margin-top:22px; padding:12px; border:none; border-radius:9px;
    background:var(--fiber); color:#fff; font-family:var(--font-body); font-weight:600;
    font-size:14px; cursor:pointer;
  }
  button:hover{ opacity:0.92; }
  .erro{
    background:rgba(214,71,58,0.08); color:var(--alert); border:1px solid rgba(214,71,58,0.25);
    padding:10px 12px; border-radius:9px; font-size:13px; margin-top:16px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-mark"></div>
      <div>
        <h1>Painel COP</h1>
        <p>CIP Telecom · área do atendente</p>
      </div>
    </div>
    <form method="POST">
      <label for="nome">Seu nome (como está cadastrado)</label>
      <input type="text" id="nome" name="nome" autocomplete="username" required autofocus>
      <label for="senha">Senha</label>
      <input type="password" id="senha" name="senha" autocomplete="current-password" required>
      <button type="submit">Entrar</button>
      {% if erro %}<div class="erro">{{ erro }}</div>{% endif %}
    </form>
  </div>
</body>
</html>
