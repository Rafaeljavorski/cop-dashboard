<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Painel COP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F4F7F9; --surface:#FFFFFF; --line:#DCE3E8;
    --text:#16232C; --text-dim:#5B6B76; --text-faint:#93A2AB;
    --fiber:#16A99C; --lime:#7CC44B; --alert:#D6473A;
    --font-display:'Space Grotesk', sans-serif; --font-body:'Inter', sans-serif;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; height:100%; }
  body{
    background:
      radial-gradient(ellipse 1200px 600px at 15% -10%, rgba(22,169,156,0.08), transparent 60%),
      radial-gradient(ellipse 900px 600px at 100% 100%, rgba(124,196,75,0.07), transparent 55%),
      var(--bg);
    color:var(--text); font-family:var(--font-body);
    display:flex; align-items:center; justify-content:center;
    padding:20px;
  }
  .card{
    background:var(--surface); border:1px solid var(--line); border-radius:18px;
    padding:38px 34px 32px; width:100%; max-width:368px;
    box-shadow:0 16px 48px rgba(22,32,42,0.10);
    position:relative; overflow:hidden;
  }
  .card::before{
    content:''; position:absolute; top:0; left:0; right:0; height:4px;
    background:linear-gradient(90deg, var(--fiber), var(--lime));
  }
  .brand{ display:flex; align-items:center; gap:11px; margin-bottom:26px; }
  .brand-mark{
    width:42px; height:42px; border-radius:50%;
    flex-shrink:0; overflow:hidden;
    box-shadow:0 3px 10px rgba(22,169,156,0.25);
  }
  .brand-mark img{ width:100%; height:100%; object-fit:cover; display:block; }
  .brand h1{ font-family:var(--font-display); font-size:17px; margin:0; }
  .brand p{ margin:2px 0 0; font-size:12px; color:var(--text-dim); }

  label{ display:block; font-size:12.5px; font-weight:600; color:var(--text-dim); margin:16px 0 6px; }
  .campo{ position:relative; }
  .campo svg{
    position:absolute; left:13px; top:50%; transform:translateY(-50%);
    color:var(--text-faint); pointer-events:none;
  }
  input{
    width:100%; padding:11px 13px 11px 39px; border-radius:10px; border:1px solid var(--line);
    font-family:var(--font-body); font-size:14px; color:var(--text); outline:none;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  input:focus{ border-color:var(--fiber); box-shadow:0 0 0 3px rgba(22,169,156,0.10); }
  .campo.senha input{ padding-right:40px; }
  .alternar-senha{
    position:absolute; right:9px; top:50%; transform:translateY(-50%);
    background:none; border:none; padding:6px; cursor:pointer; color:var(--text-faint);
    display:flex; align-items:center; justify-content:center; border-radius:6px;
  }
  .alternar-senha:hover{ color:var(--fiber); background:rgba(22,169,156,0.08); }

  button[type="submit"]{
    width:100%; margin-top:24px; padding:12.5px; border:none; border-radius:10px;
    background:var(--fiber); color:#fff; font-family:var(--font-body); font-weight:600;
    font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;
    transition:opacity .15s ease;
  }
  button[type="submit"]:hover{ opacity:0.92; }
  button[type="submit"]:disabled{ opacity:0.75; cursor:default; }
  .spinner{
    width:15px; height:15px; border-radius:50%;
    border:2px solid rgba(255,255,255,0.4); border-top-color:#fff;
    animation:girar .7s linear infinite; display:none;
  }
  button[type="submit"].carregando .spinner{ display:inline-block; }
  @keyframes girar{ to{ transform:rotate(360deg); } }
  @media (prefers-reduced-motion: reduce){ .spinner{ animation:none; } }

  .erro{
    display:flex; align-items:flex-start; gap:8px;
    background:rgba(214,71,58,0.08); color:var(--alert); border:1px solid rgba(214,71,58,0.25);
    padding:10px 12px; border-radius:9px; font-size:13px; margin-top:16px;
    animation:tremer .35s ease;
  }
  .erro svg{ flex-shrink:0; margin-top:1px; }
  @keyframes tremer{
    0%, 100%{ transform:translateX(0); }
    25%{ transform:translateX(-4px); }
    75%{ transform:translateX(4px); }
  }
  @media (prefers-reduced-motion: reduce){ .erro{ animation:none; } }

  @media (max-width:400px){
    .card{ padding:30px 22px 26px; border-radius:14px; }
  }
</style>
</head>

      <div>
        <h1>Painel COP</h1>
        <p>CIP Telecom · área do atendente</p>
      </div>
    </div>
    <form method="POST" id="form-login">
      <label for="nome">Seu nome (como está cadastrado)</label>
      <div class="campo">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <input type="text" id="nome" name="nome" autocomplete="username" required autofocus>
      </div>

      <label for="senha">Senha</label>
      <div class="campo senha">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="senha" name="senha" autocomplete="current-password" required>
        <button type="button" class="alternar-senha" id="btn-alternar-senha" aria-label="Mostrar senha">
          <svg id="icone-olho" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>

      <button type="submit" id="btn-entrar"><span class="spinner"></span><span id="texto-btn">Entrar</span></button>
      {% if erro %}
      <div class="erro">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span>{{ erro }}</span>
      </div>
      {% endif %}
    </form>
  </div>

  <script>
    const campoSenha = document.getElementById('senha');
    const btnAlternar = document.getElementById('btn-alternar-senha');
    btnAlternar.addEventListener('click', () => {
      const mostrando = campoSenha.type === 'text';
      campoSenha.type = mostrando ? 'password' : 'text';
      btnAlternar.setAttribute('aria-label', mostrando ? 'Mostrar senha' : 'Ocultar senha');
      document.getElementById('icone-olho').innerHTML = mostrando
        ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/>'
        : '<path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.6 21.6 0 0 1 5.06-6.06M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a21.6 21.6 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
    });

    document.getElementById('form-login').addEventListener('submit', () => {
      const btn = document.getElementById('btn-entrar');
      btn.classList.add('carregando');
      btn.disabled = true;
      document.getElementById('texto-btn').textContent = 'Entrando…';
    });
  </script>
</body>
</html>
